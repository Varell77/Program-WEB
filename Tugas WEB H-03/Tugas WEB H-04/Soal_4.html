<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>News and Events</title>

<style>
body{
    background:#dcdcdc;
    font-family:"Times New Roman", serif;
}

/* FRAME */
.browser{
    width:520px;
    margin:40px auto;
    border:3px solid #2c6aa0;
    background:white;
}

/* HEADER */
.topbar{
    background:#2c6aa0;
    height:28px;
}

.tab{
    background:#e6e6e6;
    width:180px;
    padding:5px;
    margin-left:10px;
    margin-top:-20px;
    border-radius:5px 5px 0 0;
    font-size:13px;
}

.address{
    background:#f5f5f5;
    padding:5px 10px;
    font-size:12px;
    border-bottom:1px solid #ccc;
}

/* BACKGROUND MERAH */
.main{
    background:#990000;
    padding:30px;
}

/* ROUNDED BOX */
.box-top{
    background:
        url('images/box_tl.gif') no-repeat top left,
        url('images/box_tr.gif') no-repeat top right,
        url('images/box_t.gif') repeat-x top;
}

.box-middle{
    background:
        url('images/box_l.gif') repeat-y left,
        url('images/box_r.gif') repeat-y right;
}

.box-bottom{
    background:
        url('images/box_bl.gif') no-repeat bottom left,
        url('images/box_br.gif') no-repeat bottom right,
        url('images/box_b.gif') repeat-x bottom;
    height:10px;
}

/* ISI */
.box-content{
    background:#8b0000;
    color:white;
    padding:20px;
    margin:0 12px;
    width:220px;
}

.tanggal{
    font-size:22px;
    font-weight:bold;
    margin-bottom:15px;
}

.box-content p{
    line-height:1.5;
}

/* LINK */
.more{
    display:block;
    margin-top:15px;
    color:yellow;
    text-decoration:none;
}

.more:hover{
    color:limegreen;
    text-decoration:underline;
}
</style>

</head>

<body>

<div class="browser">

    <div class="topbar"></div>
    <div class="tab">News and Events</div>

    <div class="address">
        file:///D:/maranatha/Pe
    </div>

    <div class="main">

        <div class="box-top">
            <div class="box-middle">
                <div class="box-content">

                    <div class="tanggal">12.02.2011</div>

                    <p>
                        Satu per satu para pesaing Manchester United mulai 
                        menunjukkan tanda-tanda "menyerah". Kini tinggal..
                    </p>

                    <a href="#" class="more">more</a>

                </div>
            </div>
        </div>

        <div class="box-bottom"></div>

    </div>

</div>

</body>
</html>
