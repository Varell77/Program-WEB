<!DOCTYPE html>
<html>
<head>
<title>Form Tambah Data User</title>

<style>

body{
font-family: Times New Roman;
}

.container{
width:500px;
margin:20px auto;
border:3px solid black;
padding:20px;
background:#eee;
}

h2{
text-align:center;
}

table{
width:100%;
}

td{
padding:8px;
}

input{
width:220px;
}

</style>

</head>

<body>

<div class="container">

<h2>Form Tambah Data User</h2>

<form>

<table>

<tr>
<td>Name</td>
<td>:</td>
<td>
<input type="text" name="name"
required
oninvalid="this.setCustomValidity('Name is required!!!')"
oninput="this.setCustomValidity('')">
</td>
</tr>

<tr>
<td>Address</td>
<td>:</td>
<td>
<input type="text" name="address"
required
oninvalid="this.setCustomValidity('Address is required!!!')"
oninput="this.setCustomValidity('')">
</td>
</tr>

<tr>
<td>Email</td>
<td>:</td>
<td>
<input type="email" name="email" required>
</td>
</tr>

<tr>
<td>Home Page</td>
<td>:</td>
<td>
<input type="url" name="homepage">
</td>
</tr>

<tr>
<td>Birthday</td>
<td>:</td>
<td>
<input type="text" placeholder="hh/bb/tttt">
</td>
</tr>

<tr>
<td>Favorit Color</td>
<td>:</td>
<td>
<input type="color">
</td>
</tr>

<tr>
<td>IPK</td>
<td>:</td>
<td>
<input type="number"
min="0"
max="4"
step="0.1"
value="0">
</td>
</tr>

<tr>
<td>Phone Number</td>
<td>:</td>
<td>
<input type="text"
pattern="[0-9]{3}-[0-9]{7,10}"
placeholder="123-1234567">
</td>
</tr>

<tr>
<td></td>
<td></td>
<td>
<input type="submit" value="Add" style="width:70px;">
</td>
</tr>

</table>

</form>

</div>

</body>
</html>
