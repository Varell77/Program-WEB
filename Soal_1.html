<!DOCTYPE html>
<html>
<head>
    <title>2473040-Varel Barus</title>
</head>
<body>

<table border="1" width="700" align="center" cellspacing="0" cellpadding="0">

    <!-- A -->
    <tr height="80">
        <td colspan="4" bgcolor="#0b00ff" align="center">A</td>
        <td rowspan="4" width="120" bgcolor="yellow" align="center">D</td>
    </tr>

    <!-- B -->
    <tr height="100">
        <td rowspan="4" width="120" bgcolor="yellow" align="center">G</td>

        <td colspan="2" width="290" bgcolor="red" align="center">B</td>

        <td rowspan="2" width="170" bgcolor="#00ff00" align="center">C</td>
    </tr>

    <!-- F dan X -->
    <tr height="130">
        <td rowspan="2" width="170" bgcolor="#00ff00" align="center">F</td>

        <td width="120" bgcolor="black" align="center">
            <font color="white">X</font>
        </td>
    </tr>

    <!-- E -->
    <tr height="100">
        <td colspan="2" width="290" bgcolor="red" align="center">E</td>
    </tr>

    <!-- H (FULL LEBAR termasuk bawah G dan D) -->
    <tr height="80">
        <td colspan="4" bgcolor="#0b00ff" align="center">H</td>
    </tr>

</table>

</body>
</html>
